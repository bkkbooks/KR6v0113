名卷數兼受集記者等四個部分在此依次考察這四個部分的分行問題首先標題部分亦即南宗頓教最上大乘摩訶般若波羅蜜經六祖惠能大師於韶州大梵寺施法壇經是否應該分行如前所述雖然敦博本對此不分但斯本旅博本均分旅博本還特意作了分隔記號由此孟本周本鄧遼本李申本中島本的分行是正確的而李富華本楊本潘本黃本的不分行是錯誤的關於標題問題本文的疏釋部分還要討論此處從略其次卷數部分卷數應該連屬在標題之後這一點無論是敦煌遺書原卷還是諸録校者的録文都是一致的可以不再討論再次兼受亦即兼受無相戒部分如上文已經分析的兼受無相戒五字如果上掛則受應校改為授表示惠能向與會的所有成員傳授無相戒表示壇經中有授無相戒的內容而這五個字如果下聯則應保留受字表示法海是一個曾經接受過無相戒的僧人所以這是一個不得不辨的重要問題諸多録校本中意見極其分歧孟本李申本李富華本楊本主張不校改而下聯鄧遼本主張校改而上掛周本中島本補校後既上掛又下聯潘本黃本校改後既不上掛又不下聯但從敦煌遺書看雖然敦博本斯本都是既上掛又下聯但最講究標題的格式的旅博本卻僅上掛不下聯所以我認為以旅博本為依據的鄧遼本對此的處理是正確的其餘諸録校本的處理是錯誤的首先我們看看主張下聯的研究者的意見孟本李申本李富華本楊本録校為下聯但沒有說明這樣做的理由不過最早這樣録校的郭本說明了這樣處理的理由有人將兼受無相戒連上即施法壇經一卷兼受授無相戒筆者以為這有些牽強因為書題至施法壇經特別是還有一卷二字已經完結如再連上兼授不僅邏輯上難以說通而且慧能兼授的並不只是無相戒光提一種也很不完全兼受無相戒云者法海身為比丘必當已受比丘戒從慧能學禪復受無相戒故稱兼受孟本李申本李富華本楊本等下聯而不作說明大約都同意郭本的觀點我認為上述說法值得商榷郭本主張兼受無相戒下聯的理由之一是標題到一卷已經結束在一卷後附加內容有些牽強在一般情況下標題到一卷的確已經結束但正如上文所述敦煌遺書在用標題表述文獻中的主要內容外往往將其他一些內容用細字標注於標題下如前引伯號記室備要它的標題記室備要一部之下有細字並序這個細字就是補充說明標題的在這裏細字作為標題的附屬與標題已經成為一個整體郭本忽略了兼受無相戒這幾個字也用細字書寫從而忽略了它們的附屬標題的地位郭本的理由之二是標題連上兼授邏輯上難以說通因為慧能兼授的並不只是無相戒就壇經而言惠能此次在大梵寺講堂所說可分為不請自說與應機而說兩部分其不請自說的部分主要有三方面內容述得法因緣說法授戒述得法因緣是為了宣示自己說法的合法性下餘的活動只有說法授戒兩項所以壇經開宗明義惠能大師於大梵寺講堂中升高座說摩訶般若波羅蜜法授無相戒由此郭本的上述說法站不住腳在這次法會中惠能除了說法兼授的只有授無相戒一種郭本的理由之三是法海身為比丘必當已受比丘戒從慧能學禪復受無相戒故稱兼受所以應該下聯如前所述如果將兼受無相戒上掛是指惠能對參加法會的信衆普授無相戒如果是下聯則是法海特受惠能授豫的無相戒如果的確是後者而法海作為壇經的編者又特意將兼受無相戒標著在自己的名字上則在當時這種無相戒必然是非同一般的只有具有特別根機或機緣的人才能得受所以法海要把無相戒作為一種資格特別提出冠在自己的名稱上但實際上我們從壇經可以知道無相戒乃是惠能普授給所有的信衆的既然無相戒是一種普授的戒沒有什麼值得誇耀的那麼法海有什麼必要以此自炫呢如下所述現知唐代其他幾個壇經的名稱法海前均不署兼受無相戒可見這不是什麼值得特別稱道的事情其次我們看看主張既上掛又下聯的意見周本中島本既上挂又下聯但中島本僅是照録周本沒有說明理由周本則作說明周本主張兼受無相戒五字中的留空乃是省略由此主張把留空補足後校改為兼授無相戒受無相戒九字前五個字上掛後四個字下聯但周本的留空乃是省略的說法站不住腳這一點下文再談所以既上掛又下聯的方案也不能說服人潘本黃本採用了不上掛又不下聯的懸浮方案但對此沒有做一個字的說明這種方案無法從邏輯上得到論證從排列組合的角度來說這段文字的處理只能有四種方式上挂下聯既上挂又下聯既不上挂又不下聯上述四種方式都有人採用如前所述依據旅博本這段文字應該上挂其他的方式都是錯誤的最後集記者部分敦煌本壇經的集記者部分均與兼文連寫但從旅博本可以看出它與兼文實際是兩個意群諸種録校本均將集記者單獨作一行這種方法既不違反敦煌遺書的一般抄寫格式也符合現代人的閲讀習慣自然是可以依從的第二關於留空諸種敦煌本壇經標題的兼受無相戒中均有留空但諸種録校本中只有周本注意並力圖解決這一問題中島本隨之潘本鄧遼本注意到了而又回避其他幾種録校本均沒有涉及不知是否注意到周本這樣說根據鄧文寬君研究敦煌寫本一般習慣對於熟悉用字用詞乃至短句常採用空格形式省去重復之字所見極是此處空格即依其式樣補校戒受無相四字從而將兼受無相戒校補為兼授無相戒受無相戒九字前五個字上掛後四個字下聯企圖由此解決普授與特受的矛盾周本的上述方法不能成立在此先看看鄧文寬關於空字省書的論述鄧氏提出為了節省書寫時間古人除用省代符號代替某些字句之外另一種方法是用空幾字即不書字而省略並舉出敦博本壇經中的一個例子菩薩戒經云我本源自性清淨識心見性自成佛道即時豁然還得本心認為佛道與即時之間的約兩個字的留空實際表示此處省略了維摩經云四字由於敦煌本壇經的另一處還引用了即時豁然還得本心這八個字前面的確注明維摩經云所以鄧文寬的上述推斷是有理由的但是敦博本壇經文中留空甚多大抵表示句讀段落前引文字雖有約兩個字的留空如果把這留空看作是句讀文氣亦連貫可通而所謂空字省書除了上述壇經中的一例我們至今還沒有發現其他用例因此這種空字省書是否可以作為敦煌遺書的書寫規則還需要進一步研究即使鄧文寬上述空文省書的書寫規則可以成立這種規則能否同樣套用於標題的書寫還是一個問題起碼鄧文寬自己沒有在鄧遼本的録校中套用這種方式來解決壇經標題中的兼受無相戒的留空問題按照鄧文寬所說空文省書的方式所省應該是熟語而周本所補的戒受無相顯然不能歸為熟語此外將兼受無相戒校補為兼授無相戒受無相戒行文纍贅囉嗦與壇經的風格完全不合還有如前所述既然無相戒屬於普授大衆的戒律則法海實在不必專門將它揭示在自己的名字之前所以周本把兼受無相戒的留空作為省文的觀點不能成立那麼這一留空到底是什麼意思呢我認為這可能是抄寫者為了強調無相戒無相的特點特意留下的象徵性的表象當然雖然後代禪宗確有採用象徵性表象的做法但此處的留空是否也屬此類這還需要進一步研究第三關於細字敦煌本壇經標題有細字即兼受無相戒五個字這五個字所以寫作細字是為了體現它附著於一卷之後的地位以及表示該文獻還包括授無相戒諸録校本中孟本潘本中島本黃本完全忽略了細字問題周本鄧遼本李申本李富華本楊本看來有細字但其矚目點是集記者將集記者寫作細字包括楊本將一卷寫作細字實際是現代人的書寫習慣這種方法雖然不違反古代文獻的書寫習慣但與敦煌本壇經原有細字的意義並不相同我們的録校本應該保持原本固有的研究信息不使流失綜上所述敦煌本壇經標題的正確書寫法應該是南宗頓教最上大乘摩訶般若波羅蜜經六祖惠能大師於韶州大梵寺施法壇經一卷兼授無相戒弘法弟子法海集記五疏義這裏想談談敦煌本壇經標題及其相關問題我曾經撰文這樣說鄧文寬先生提出敦煌本壇經的標題實際由正題副題兩部分組成站在上述考察的立場上我認為這個觀點基本上可以成立有意思的是據我的印象中國古代書籍似乎沒有正題副題之分這種取名方法是近代西學東漸以後才有的如果上述觀點可以成立則正題副題的取名法在古代已經出現了哪怕只是一個特例也罷值得注意的是實際上敦煌本壇經的副題與它的原題最接近而它的正題是後來産生的我認為很可能是神會滑臺大會與北宗爭正統以後出現的這與敦煌本壇經本屬神會系傳本也正相吻合我的基本觀點在上文已經表明即第一敦煌本壇經的副題産生在前與原題最接近而正題産生在滑臺大會之後第二敦煌本壇經是神會系的傳本這兩個問題相互關聯下面簡單談談敦煌本壇經的標題甚為冗長這樣風格的標題在我國古代佛教文獻中除了密教文獻外很少見到主要因為它由正題南宗頓教最上大乘摩訶般若波羅蜜經與副題六祖惠能大師於韶州大梵寺施法壇經兩個部分組成那麼壇經最早的標題是否就是像敦煌本這樣有兩個部分呢現知的壇經傳世本除敦煌本外有惠昕本系契嵩本系等不同傳本存世惠昕本是惠昕於北宋乾德五年改編的本子它當初的標題是什麼現在已經很難考證但屬於惠昕本系統的日本京都興聖寺本的標題作六祖壇經也屬於惠昕本的日本石川縣大乘寺本及金山天寧寺本的標題作韶州曹溪山六祖大師壇經由契嵩於至和三年改編的契嵩本系統標題基本作六祖大師法寶壇經這些標題都比較朴實大體相當於敦煌本的副題但這些本子出現得比較晚在唐代壇經是否還有別的名稱呢日本入唐僧圓仁撰於承和十四年的入唐新求聖教目録著録了一部壇經作曹溪山第六祖惠能大師說見性頓教直了成佛決定無疑法寶記檀經一卷門人法海譯據說在朝鮮古刊本中也有得自唐代的壇經標題與圓仁本相近作曹溪山第六祖慧能大師說見性頓教直了成佛決定無疑法釋沙門法海集上述標題與敦煌本的正題副題都不一樣但比較而言上述標題的前半部分與副題的前半部分有些相同日本入唐僧圓珍於大中八年所記福州溫州台州求得經律論疏記外書等目録也載有壇經一部作曹溪山第六祖能大師壇經一卷門人法海集隨身在圓珍大中十一年所撰日本比丘圓珍入唐求法目録中以及大中十二年所撰智證大師請來目録再次著録了這部壇經曹溪能大師壇經一卷圓珍著録的這兩個名稱與敦煌本的副題也比較接近圓珍在兩個不同的目録中對同一部經典著録了兩個不同的名稱這或者可以用一繁一簡來解釋但也說明當時對壇經的稱呼還有一定的隨意性上面幾條都是唐代的資料撰寫於日本寬治八年相當於中國北宋紹聖元年的東域傳燈目録對壇經的著録就變成六祖壇經二卷這與契嵩本以及我國北宋起開始流傳六祖壇經這一名稱是一致的綜合上述資料我認為與諸多其他標題相比敦煌本壇經的副題六祖惠能大師於韶州大梵寺施法壇經一卷兼受無相戒就其形態而言最為質朴這個標題即使不是壇經最早的標題也與最早的標題最為接近惠能逝世後神會主張以壇經傳宗攜帶著壇經北上滑臺大會上神會指斥神秀系師承是旁法門是漸標榜自己的南宗才是正統頓教才是無上法門所以為壇經另立標題也就是敦煌本壇經的正題南宗頓教最上大乘摩訶般若波羅蜜經這個標題是在激烈的論辨中産生的因此有最上大乘之類充滿戰鬥性的風格神會系禪宗後來傳到敦煌神會系的壇經也傳到敦煌就是我們現在看到的本子神會只是惠能的弟子之一惠能的其他弟子也依據壇經傳播惠能的思想圓珍著録的曹溪山第六祖能大師壇經曹溪能大師壇經這兩個名稱顯然是從六祖惠能大師於韶州大梵寺施法壇經一卷兼受無相戒這類名稱中化出後代惠昕本的六祖壇經韶州曹溪山六祖師壇經契嵩本的六祖大師法寶壇經也都是從這一名稱轉化來的圓仁著録的曹溪山第六祖惠能大師說見性頓教直了成佛決定無疑法寶記檀經與敦煌遺書中發現的一批禪宗南宗文獻的標題風格一致可見是在南宗席捲中華大地時有人仿照南宗文獻的風格改編的它與敦煌本顯然是兩個不同的系統應該是惠能其他弟子所依據的傳本也就是說通過對壇經標題的考察我們可以發現敦煌本壇經並非最早的壇經傳本而只是神會系的傳本當時與神會系壇經同時流傳的還有其他一些壇經傳本這或者能夠解釋後代壇經歧雜多樣的原因我國胡適曾經提出敦煌本壇經是神會編纂的他的這一觀點沒有得到學術界的贊同但是胡適的確發現了敦煌本壇經與神會系具有的密切關係在敦煌本壇經中我們可以發現一些內證證明該本曾經神會系僧人的改纂關於這一點已經有不少研究者進行過論述本文在此從略本文對敦煌本壇經標題的研究也證明該本確為神會系的傳本六原始資料下面將諸種敦煌本壇經的標題録文如下以為參照敦博本南宗頓教最上大乘摩訶波若波羅蜜經六祖惠能大師於韶州大梵寺施法壇經一卷兼受無相戒弘法弟子法海集記斯本南宗頓教最上大乘摩訶般若波羅蜜經六祖惠能大師於韶州大梵寺施法壇經一卷兼受無相戒弘法弟子法海集記旅博本南宗頓教最上大乘摩訶般若波羅蜜經六祖惠能大師於韶州大梵寺施法壇經一卷兼受無相戒弘法弟子法海集記
