body:
  text: 標題章方廣錩標題一正文南宗頓教最上大乘摩訶般若波羅蜜經六祖惠能大師於韶州大梵寺施法壇經一卷兼授無相戒弘法弟子法海集記二校記並諸家録校復議南宗頓教最上大乘摩訶般若波羅蜜經南敦博本斯本旅博本自此起般敦博本作波據斯本旅博本改孟本失校周本楊本潘本鄧遼本中島本黃本校改作般李申本李富華本徑改作般復議周本楊本潘本鄧遼本中島本黃本為正孟本失校不妥李申本李富華本徑改不妥六祖惠能大師於韶州大梵寺施法壇經惠能敦博本斯本旅博本同孟本李申本李富華本潘本鄧遼本中島本黃本照録周本楊本校改為慧能復議諸敦煌本通篇均作惠能且早期禪宗著作六祖之名亦均稱惠能故此處應録校作惠能孟本李申本李富華本潘本鄧遼本中島本黃本為正周本楊本校改為慧能不妥楊本校記謂題目及正文中的慧能皆寫作惠能智慧寫作智惠等今一律改為慧能智慧定慧周本正文除將惠能校改為慧能外亦均將惠校改為慧作智慧定慧等為避文繁以下凡周本楊本校改惠為慧者除特殊情況一概不作說明與復議一卷無兼授無相戒授敦博本斯本旅博本均作受理校作授孟本李申本李富華本楊本照録作受周本的意見參見本句校記潘本鄧遼本中島本黃本校改為授復議雖然敦煌本壇經的抄寫者授受不分但授受兩者字義有別如為授則表示惠能向法會的全體參與者傳授無相戒如為受則表示作者法海是一個曾從惠能接受無相戒的僧人前者是普授後者是特受且這裏直接涉及對壇經性質的認識涉及到標題的寫法不可不辨細案壇經原文此處應為惠能向與會信徒普授無相戒故應理校為授周本潘本鄧遼本中島本黃本為正孟本李申本李富華本楊本照録作受不妥無相戒敦博本斯本旅博本同孟本録作相戒漏無字對留空失校李申本李富華本楊本黃本均録作無相戒對留空失校潘本鄧遼本在校記中注意到留空但録文仍作無相戒復議周本主張受無相戒中相與戒之間的留空表示省去重復之字並將受無相戒補校作授無相戒受無相戒中島本照録周本孟本李申本李富華本楊本黃本無視留空失校不妥孟本漏無字尤為不妥潘本鄧遼本注意到留空但未作處理不妥周本中島本用省略重復字來解釋這裏的留空不能成立弘法弟子法海集記記敦博本斯本旅博本同諸本照録唯中島本漏復議中島本漏字不妥三注釋南宗指禪宗惠能系惠能系起先主要流傳於南方唐開元二十年惠能弟子神會在滑臺大雲寺的無遮大會上極力批評流傳於北方的禪宗神秀系師承是旁法門是漸為惠能系爭正統禪宗內部從此産生宗派之諍出現南宗這一名稱後人追溯當時禪宗北宗南宗分流的情況亦有南能北秀的說法南宗至後世極盛被視為禪宗正統北宗傳承法系逐漸湮沒無聞頓教神會稱惠能系禪法的基本特徵為頓悟指斥神秀系北宗主張漸悟頓教即頓悟之教敦煌本壇經在標題上揭示頓教字樣是為了高揚本宗的理論標志最上大乘大乘是印度佛教的主要派別之一與小乘相對主張一切衆生都有佛性應以六度普度衆生以求佛道中國佛教主要流傳大乘故往往推崇大乘貶斥小乘大乘內部又有諸多派別與思想最上大乘一詞則是大乘中某些派別的自我美稱早在東晉南北朝已經出現禪宗南宗僧人亦用此名稱作為對本宗的美稱意為禪宗南宗是最高級最上等的大乘摩訶般若波羅蜜經摩訶為梵文的音譯意謂大是美稱般若波羅蜜為梵文音譯意謂智度為大乘佛教六度之一摩訶般若波羅蜜經亦為印度佛教宣說般若思想的重要經典漢文有鳩摩羅什譯本印度佛教般若思想主張由智慧而達佛道亦即所謂般若是諸佛之母在中國影響甚大但此處的摩訶般若波羅蜜經並非指稱鳩摩羅什所譯摩訶般若波羅蜜經而是借用般若是諸佛之母的含義宣揚惠能的這部壇經就是一部可以由般若之智而抵達佛道的經典郭朋認為般若思想屬於空宗惠能思想屬於有宗把摩訶般若波羅蜜經也插進壇經的標題裏實在是不倫不類的般若之與壇經是空有異趣迥不相同的其實惠能佛性論的根基仍是般若思想惠能聽金剛經而有悟一生深受金剛經影響就是明證把佛性論與般若思想有機地結合為一個整體這正是惠能思想的特點且如前所述此處的摩訶般若波羅蜜經主要意義是指以般若智慧成佛之經並非指論述般若思想的鳩摩羅什譯摩訶般若波羅蜜經或其他般若系的某一部經典郭朋把標題中的摩訶般若波羅蜜經等同於羅什所譯的摩訶般若波羅蜜經從而做出上述批評該觀點尚可斟酌六祖此處指惠能禪宗南宗主張惠能是繼達摩慧可僧璨道信弘忍遞傳的東土禪宗第六代正統祖師禪宗的不同派別對何人為六祖說法不一惠能唐代僧人本經的說法者我國禪宗南宗的創始人禪宗第六祖也有人主張他是中國禪宗的實際創始人俗姓盧生於唐太宗貞觀十二年死於唐玄宗先天二年唐憲宗時諡號大鑒禪師慧能的遺體由其弟子方辨裹紵塗漆保存至今現供奉於廣東曲江縣南華寺即古代的寶林寺大師對佛教僧人的尊稱韶州唐代州名當時的治所在今廣東韶州郭朋壇經校釋稱韶州今廣東曲江縣大梵寺在韶州城內鄧遼本亦稱韶州唐代州名治所在今廣東省曲江縣大梵寺唐時位於韶州城內類似的說法又可見李申六祖壇經等按照上述說法唐代的大梵寺在唐代的韶州城內而唐代的韶州城相當於現今的廣東省曲江縣馬壩也就是說大梵寺應該在現今的曲江縣馬壩但實際上大梵寺在今韶州韶關城內關於這個問題筆者請教了南華寺的雲峰法師據雲峰法師見告曲江縣治原在韶關後遷馬壩故在曲江縣治遷移馬壩以前說韶州今廣東曲江縣大梵寺在韶州城內是對的而在曲江縣治遷移馬壩以後的今天再那樣說就是錯誤的大梵寺在今廣東韶州城內因惠能的諡號為大鑒禪師故該寺現名大鑒寺丁福保佛教大辭典引廣東通志卷二二九謂韶州府曲江縣報恩光孝寺在河西唐開元二年僧宗錫建名開元寺又更名大梵寺刺史韋宙請六祖說壇經處宋崇寧三年詔諸州建崇寧寺致和中改天寧寺紹興三年專奉徽宗香火賜額曰報恩光孝寺據此該寺乃唐開元二年由僧宗錫所建初名開元寺其後改稱大梵寺何時改稱大梵寺不詳這一說法為郭朋等研究者所信從但筆者頗為懷疑這一說法的可靠性首先惠能早在先天二年已經逝世但按照上述說法惠能在大梵寺說法的時間應該在開元二年以後兩者相互矛盾其次唐開元初年諸州均據朝廷敕令修建官寺開元寺但既是依照敕令修建的官寺就不應該由僧人個人出面建造由於唐代敕建之官寺往往有以現成寺院換額改稱者所以我認為如果該寺確由宗錫修建的話則很可能是先由宗錫修建大梵寺開元二年當地官員將大梵寺換額改稱開元寺據前述廣東通志記載該寺直到宋代還保持著官寺身份由此反映該寺在當地一直為人們所重視這或許是該寺保留至今且當地耆老至今能明其由來的原因施法佛教認為僧人說法乃是向聽法者布施佛法故稱壇原為土築的臺子用以進行某些儀式或宗教活動後用來對譯梵文曼荼羅指修持佛法時所造的供養佛像菩薩像供養具等的臺子其構築有一定的規範與儀軌此處指為尊重惠能教法供他說法用的臺子釋門正統卷八載韶守韋據請住大梵學者逾千封土為壇說法其上録為壇經經梵文的意譯佛教傳統凡佛金口所說方可稱之為經非佛所說而妄稱經者概為僞經壇經所以被稱為經是因為在當時禪宗信徒的心目中惠能已經是一個活佛壇經記載當時信徒的稱讚嶺南有福生佛在此生佛即活佛指惠能兼授壇經的主體記録了惠能在大梵寺主持的某次法會這次法會的主要內容如正文所述是惠能大師於大梵寺講堂中升高座說摩訶般若波羅蜜法授無相戒亦即包括說法授戒兩項所以壇經標題上的兼授表示本文獻所記録的除了惠能所說之法外還兼有惠能為聽法者所授的無相戒當一個文獻中兼有其他內容時敦煌遺書往往用細字於標題卷次下注出無相戒又稱無相心地戒惠能創立的禪宗戒法惠能認為諸法性空佛性本淨無相戒即以該清淨佛性作為戒體由於佛性無相實相為空諸法既空罪性亦空所以持戒者心無繫縛遠離執著等視諸戒猶如虛空站在上述立場上惠能對佛教戒律的基本態度即如壇經所謂心平何須持戒因此在實際持戒中並不像其他戒法那樣需要有日常的儀軌與行相故曰無相戒根據壇經授無相戒包括歸依自性三身佛發四弘願誓無相懺悔三性三歸依戒等內容參見宋道元纂景德傳燈録卷五宋紹曇記五家正宗贊卷一宋寶曇述大光明藏卷一宋普濟集五燈會元卷一無相與戒之間留空應該是為了象徵該戒無相之特點法海唐代僧人曲江人生卒年不詳根據壇經法海是惠能十大弟子之首他集録惠能在韶州大梵寺說法及平時與弟子的說法交接事跡纂成壇經生平事跡主要見於壇經四分段標點復議敦煌本壇經標題包括經名卷數兼授集記者等內容這裏主要討論標題的書寫格式並由此探討一些相關問題敦煌本壇經的標題是否具有特定的書寫格式這是問題的前提為了回答這一問題需要仔細審核與比較敦博本斯本旅博本等三本的照片所以要使用照片是因為録文包括本文的録文受條件的限制無論怎樣努力也無法完全保留原件的格式上述三個敦煌寫本中敦博本的標題占兩行南宗頓教最上大乘摩訶波若波羅蜜經六祖惠能大師於韶州大梵寺施法壇經一卷兼受無相戒弘法弟子法海集記第一行頂天立地抄寫上部界欄並畫有一蓮花花苞狀裝飾自州字換第二行換行處文字意群割裂這說明抄寫者在抄寫標題時完全沒有考慮分行的問題所以出現換行是由於第一行抄不下那麼多文字但敦博本標題也有自己的書寫格式它表現在一無相與戒之間有留空約個字二仔細審察可以發現戒弘法三字特別是戒字比其餘諸字略小後來越寫越大乃至法字與弟字大小差不多斯本的標題占三行形態如下南宗頓教最上大乘摩訶般若波羅蜜經六祖惠能大師於韶州大梵寺施法壇經一卷兼受無相戒弘法弟子法海集記第一行上端頂天下端基本到行末還留有約半字的空間換行後第二行上端比第一行低一字這說明抄寫者是有意分行不是因為第一行抄不下而不得不換行換行處前後文字意群獨立標題被分為兩個相對獨立的部分也證明這是特意分行不是被動換行第二行下端與第一行下端基本齊平有約半字的空間第三行上端低一字與第二行齊平在敦煌遺書中這種抄寫方式意味著第三行與第二行本來應該是同一行因為第二行已經到行末下餘的文字抄不下只好換行所以換行後的文字與第二行齊頭也就是說兼受無相四字應上聯此外無相與戒字之間也有留空約個字兼受無相四字為細字根據上面的討論已完全可以證明敦煌本壇經的標題應有一定的書寫格式但這種格式到底怎樣還不是很清楚但在旅博本中敦煌本壇經標題的書寫格式表現得最為清晰旅博本標題占三行南宗頓教最上大乘摩訶般若波羅蜜經六祖惠能大師於韶州大梵寺施法壇