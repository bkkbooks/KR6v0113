body:
  text: 前言方廣錩一宗旨敦煌本壇經被發現後由於它是現存時代最早的壇經寫本對惠能研究禪宗研究壇經研究均有著極其重要的價值所以引起學術界佛教界持久的興趣諸種録校本不斷湧現據不完全統計到目前為止國內外共發表各種録校本約種但是由於種種原因諸録校本都還不能盡如人意需要進一步整理與研究敦煌本壇經校釋疏義就是一個新的努力為此我們在上海師範大學哲學系組成敦煌本壇經研讀班該研讀班由方廣錩主持參與者分頭執筆撰寫所承擔部分的初稿然後集體會讀研討最後由方廣錩修改定稿我們的目的是想通過我們的工作為學術界提供比較可靠的敦煌本壇經整理本或者說我們想盡可能保持與恢復敦煌本壇經之原貌為學術界下一步的研究提供一個比較可靠的文本基礎在我們看來沒有一個可靠的文本基礎一切所謂的研究都是空中樓閣煮砂成飯關於這一點可以參見本書研究論文專欄所載的敦煌本壇經録校三題何照清在其壇經研究方法的反省與拓展從壇經的版本考證談起一文中批評了西方史學界的還原主義之風並把還原主義定義為通過歷史文獻版本或語言學等學術方法歷史學者就可以通過純粹客觀的研究以還原出歷史的真相文章評論說這種由現代學術史看來很有些烏托邦式的歷史學理念在近代以來佛學史研究不斷專業化的聲浪中逐漸成為一種主流中日韓所在的亞洲也感染了這種風氣壇經的研究自然不能例外作為壇經研究中這種烏托邦式的還原主義的例子之一他舉出一九九九年九月大陸出版的敦煌壇經合校簡注依然可見學者們心中那種還原主義的渴盼本校本之目的在於保持與恢復敦煌本之原貌類似的期許在在說明恢復壇經原貌一直是壇經研究者長久以來的心願我不贊同何照清的上述論述首先上述論述把歷史學領域中的還原主義與文獻學領域中的文本還原這兩件不同的事情當作相同的命題來處理有偷換概念之嫌其次把年出版的李申合校方廣錩簡注的敦煌壇經合校簡注批評為力圖恢復壇經原貌完全是何照清的誤解敦煌壇經合校簡注的目的正如何照清上文之引文所說本校本之目的在於保持與恢復敦煌本之原貌很顯然保持與恢復敦煌本之原貌與恢復壇經原貌這又是兩件不同的事情不能混為一談敦煌壇經合校簡注在保持與恢復敦煌本之原貌這一方面的工作是否成功可以評論但何照清把該書保持與恢復敦煌本之原貌的努力批評為一種恢復壇經原貌的還原主義的渴盼實在是讀書讀得太粗心評論下得太草率本校釋疏義的目的依然是想盡可能保持與恢復敦煌本壇經之原貌也就是說我們並沒有企圖去恢復所謂惠能壇經的原貌而只是力圖保持與恢復敦煌本之原貌在我們看來壇經原貌到底是什麼樣子在沒有新的資料之前誰也不知道企圖恢復一個誰也不知道的東西的原貌注定是一個憑空搆虛無法完成的任務但敦煌本壇經已有多個寫本面世已有許多人做了許多録校做了許多研究保持與恢復敦煌本之原貌不但是可能的而且是應該的甚至是刻不容緩的為什麼保持與恢復敦煌本之原貌不但是可能的而且是應該的甚至是刻不容緩的說這一工作是可能的是因為我們不但已經掌握了五個敦煌本壇經寫本的相關資料還有已經出版的三十多種録校本可作為我們今天工作的雄厚研究基礎說這一工作是應該的是因為以前有人在整理敦煌本壇經的時候改竄了原本的面貌所以要通過我們的工作去保持原貌而不同敦煌本壇經的行文略有差異所以要通過我們的工作去恢復原貌說這一工作是刻不容緩的是因為有些研究者依據被改竄的錯誤的整理本去從事惠能研究禪宗研究壇經研究更使我們感到保持與恢復敦煌本之原貌這項工作的緊迫性二說明整理由正文校記並諸家録校復議注釋分段標點復議疏義原始資料等六部分組成說明如下一正文正文乃此次録校勘正的壇經文字並重新分段標點録校所用諸本如下底本敦博本指甘肅省敦煌市博物館藏敦煌遺書號縫繢裝首尾完整校本斯本指英國圖書館藏敦煌遺書斯號縫繢裝首尾完整旅博本指原藏於旅順博物館敦煌本壇經縫繢裝現下落不明僅存龍谷大學圖書館所藏三個半葉照片其首部半葉照片為壇經尾部兩個半葉照片為其他文獻録校依據照片進行北本指中國國家圖書館藏敦煌遺書北敦號背千字文編號岡號縮微膠卷號卷軸裝首殘尾存北殘片指中國國家圖書館藏敦煌遺書北敦號卷軸裝殘片僅五行二十世紀二十年代以來發現一些西夏文書寫的壇經殘片至今共發現號有關學者研究後認為這些西夏文壇經殘片與敦煌本漢文壇經屬於同一系統很可能是根據漢文本壇經翻譯的亦有學者嘗試將其倒譯為漢文考慮到西夏文壇經是否確屬敦煌本壇經系統尚需進一步研究以及倒譯的正確性等諸多問題此次校釋疏義除個別情況外一般不將該西夏文殘片納為校本凡是將西夏文殘片納入一併探討者均隨文說明為方便起見敦煌本壇經校釋疏義將壇經分成若干章節進行整理故正文對壇經文本之每章每節每句均豫以編號以下稱為章節號章節號以領起依次分為三段章序號節序號與句序號用小數點隔開章節號放在中標注在每句經文之後需要說明的是敦煌本壇經原本不分章節後代出現的各種壇經傳本有的不但分了章節甚至加上小標題這樣的做法看來似乎讓壇經眉目清楚但未免有割裂文意之嫌且這種做法是否符合壇經原意也有待進一步研究因此校釋疏義雖也將敦煌本壇經分為若干章節其用意只是為研讀班整理敦煌本壇經時分工與行文的方便也考慮到將來讀者引用的方便絲毫沒有為敦煌本壇經區分章節歸納大意的想法或附加任何其他意思希望讀者在閲讀時仍然把敦煌本壇經視為沒有章節的整體二校記並諸家録校復議包括校記與諸家録校復議兩個部分校記為此次研讀所作録校因旅博本北本北殘片均為殘本故僅參校現有文字並在起訖時出注說明敘列校記時首先以章節號領起壇經正文然後逐句出校記如某句無出校文字亦羅列該句然後下注無校記的寫法參見藏外佛教文獻第八輯所載録文校勘體例諸家録校復議對國內外九家有代表性的敦煌本壇經録校本進行考察所以選擇此九家是因為這九家代表了十年來敦煌本壇經録校方面的最新成果復議意見隨文記述所用九家録校本按照出版的先後次序排列如下行文除引文外均脫尊稱還祈鑒諒孟本指孟東燮敦煌本壇經校訂本載禪學研究第號日本京都花園大學禪學研究會年月周本指周紹良敦煌寫本壇經原本文物出版社年月附有五種敦煌本壇經的照片李申本指李申合校方廣錩簡注敦煌壇經合校簡注山西古籍出版社年月亦附五種照片李富華本指李富華惠能與壇經珠海出版社年月楊本指楊曾文新版敦煌新本六祖壇經宗教文化出版社年月楊曾文此書為修訂本初版時書名為敦煌新本六祖壇經上海古籍出版社年月復議以新版為主要依據潘本指潘重規敦煌壇經新書及附冊臺灣佛陀教育基金會年月潘重規此書初版於年月名敦煌壇經新書亦由臺灣佛陀教育基金會發行其後增補附冊更名為敦煌壇經新書及附冊再版發行復議以再版本為主要依據該書包括校記新書兩個部分應該說明的是學術有先後繼承後來者應該超越前人也超越先前的自我在此將九種録校本按照出版時間依次排列並復議就是為了尊重學術發展的歷史對待學者個人如果成果有先後之別自然也應該採用後發表者以示尊重如楊本年初版年修訂再版在此主要依據再版本但我發現潘本年的新版本與年的老版本完全一樣未作修訂但也未作諸如本書應該修訂但因故未能進行之類的說明這或許因為作者觀點未變無須修訂故按既定體例對潘本亦以年新本為依據並按照出版時序排列於此鄧遼本指鄧文寬六祖壇經敦煌壇經讀本遼寧教育出版社年月鄧文寬近年頗致力於敦煌本壇經的研究年月曾經在臺灣如聞出版社出版大梵寺佛音敦煌莫高窟壇經讀本以下簡稱鄧臺本年月與榮新江合作完成敦博本禪籍録校以下簡稱鄧榮本年出版鄧遼本按照上例以後出之鄧遼本為主要依據中島本指中島志郎六祖壇經該書作為第三期禪語録傍譯全書之第二卷年月由日本東京四季社出版黃本指黃連忠敦博本六祖壇經校釋臺灣萬卷樓圖書股份有限公司年月將敦博本斯本壇經的照片分段剪貼後附在相應校釋文字處需要說明的是諸家録校體例不一有些校本為避文繁凡底本正確而校本有誤者一概不出校記有些校本對某些出現頻率較高的異字錯字採用統一說明的方法不再一一出校而藏外佛教文獻為體現諸本異同逢異必校如此體例差異不一而足本校釋疏義嚴格按照藏外佛教文獻體例勘查諸本故所作評述未必符合諸本體例原意敬希見諒又上述九家中李申本李富華本為簡體字本為避文繁諸家録校復議時凡屬因簡繁體原因造成李申本李富華本文字與敦煌本有異者一般均不復議除上述九家外復議時適當參考其他有關研究成果三注釋注釋部分對壇經經文中的若干詞語進行注釋四分段標點復議這一部分主要對諸家録校本的分段標點中一些比較重要的問題進行討論至於可分可不分可斷可不斷或可句可逗之處均不豫討論又孟本與中島本依據日本對漢籍的標點習慣標點因此凡屬中日標點之不同亦不豫復議五疏義這一部分對壇經經文進行疏義六原始資料這一部分相當於附録照録諸種敦煌本壇經的原文可與諸敦煌本壇經的照片相互參看録文時每行行首的數字為該行的行號行末的號表示該行文字結束號表示該行文字尚未結束但本章文字已經結束下一章將接續録文
