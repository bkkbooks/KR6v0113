body:
  text: 第一章執筆者侯沖研讀班集體討論經文一正文惠能大師於大梵寺講堂中升高座說摩訶般若波羅蜜法授無相戒其時座下僧尼道俗一萬餘人韶州刺史韋據及諸官寮三十餘人儒士餘人同請大師說摩訶般若波羅蜜法刺史遂令門人僧法海集記流行後代與學道者承此宗旨遞相傳授有所依約以為稟承說此壇經二校記並諸家録校復議惠能大師於大梵寺講堂中升高座說摩訶般若波羅蜜法授無相戒授敦博本斯本旅博本均作受理校作授孟本潘本據興聖寺按潘本誤將興聖寺寫作興善寺以下遇到潘本誤寫均直接改為興聖寺不再出注本校作授周本楊本鄧遼本中島本理校作授李申本李富華本黃本徑改作授復議參見校記孟本周本楊本鄧遼本潘本中島本為正李申本李富華本黃本徑改不妥其時座下僧尼道俗一萬餘人韶州刺史韋據及諸官寮三十餘人儒士餘人同請大師說摩訶般若波羅蜜法一萬敦博本斯本旅博本同諸本録文同梅挺秀認為當時沒有可以容納一萬餘人的講堂亦無擴音設備故此處的萬當依據惠昕等本改為千可備一說韋據敦博本作違處斯本作據據旅博本及敦博本斯本下文行文所出韋據改孟本據興聖寺本校斯本字作韋據字照録周本將違理校作韋處字徑録李申本鄧遼本黃本據旅博本及敦博本下文行文校作韋據李富華本徑改作韋琚楊本據惠昕本等校作韋琚潘本據旅博本校為韋據中島本徑録周本之韋處復議宋代本覺歷代編年釋氏通鑑贊寧高僧傳道原景德傳燈録契嵩傳法正宗記祖琇龍興編年通論宗鑒釋門正統本覺釋氏通鑒李遵朂天聖廣燈録紹曇五家正宗贊正受嘉泰普燈録寶曇大光明藏普濟五燈會元等歷代禪宗典籍及郡齊讀書志等教外著作並作韋據與旅博本相同而韋琚一詞在電子佛典集成中找不到詞例李申本潘本鄧遼本黃本為正孟本在有敦煌本可據的情況下據其他材料校改不妥周本在有敦煌本可據的情況下理校且處字失校不妥楊本不用敦煌本而依據其他材料校改從而致誤尤為不妥李富華本徑改且改錯尤為不妥中島本徑録周本從而致誤尤為不妥士斯本旅博本均作土據敦博本改孟本據敦博本校作士其餘諸本均徑録為士復議孟本為正其餘諸本失校不妥餘人敦博本斯本旅博本同此上有脫文脫漏參加人數孟本周本中島本徑録楊本潘本鄧遼本黃本或據惠昕本或據興聖寺本或據惠昕等三本校補作三十餘人李申本照録但出校記說明數種校本改作三十餘人李富華本徑補作三十餘人復議敦煌本餘人之上肯定脫漏人數但各相關資料對參加此次法會人數的記載不同如惠昕等本作刺史官寮僚等三十餘人儒宗學士三十餘人金山天寧寺本大乘寺本作刺史官僚儒宗學士六十餘人而宋本覺編集釋氏通鑑卷八參考壇經記則稱刺史官寮等三十餘人故所脫漏的具體人數難以確證此處宜出校記說明不應徑補李申本為正孟本周本中島本失校不妥楊本潘本鄧遼本黃本依據非敦煌材料改動敦煌本且無確證不妥李富華本徑補尤為不妥刺史遂令門人僧法海集記流行後代與學道者承此宗旨遞相傳授有所依約以為稟承遂敦博本斯本旅博本同孟本作韋遂其他諸本並作遂復議諸本均為正孟本擅自增字致誤尤為不妥流敦博本作𧨆據斯本旅博本改孟本周本李申本李富華本楊本潘本中島本黃本徑作流鄧遼本據斯本旅博本校作流復議此字應為流涉上記字偏旁寫作言乃敦煌遺書常見之俗寫變形字鄧遼本為正其餘諸本失校不妥代敦博本斯本旅博本同潘本理校作代校記稱原卷代作伐敦煌俗寫代伐不分其餘諸本徑録為代復議斯本旅博本字形略異右邊弋中橫上一點寫到橫下形似丿查斯本壇經共有個代字其右上之點往往寫在一下有時還寫成丿此乃敦煌寫本代字之俗寫變形在其他敦煌遺書中亦時有出現諸本為正潘本辨字有誤潘本稱敦煌俗寫代伐不分缺乏舉證承敦博本斯本旅博本同潘本録為承出校記稱原卷作永敦博本作承其餘諸本徑録為承復議諸本為正潘本辨字有誤授敦博本作受據斯本旅博本改孟本李申本李富華本潘本徑改作授周本楊本鄧遼本徑録敦博本作受中島本黃本理校作授復議孟本李申本李富華本潘本徑改不妥周本楊本鄧遼本失校不妥中島本黃本有校本而理校不妥依斯本作於據敦博本旅博本改孟本據敦博本校作依周本李富華本楊本中島本徑録作依李申本校作依說明斯本作於鄧遼本校作依認為依於為唐五代河西方音互通字潘本校作依認為依通於為敦煌俗寫黃本徑録作依但在附録四敦煌兩本六祖壇經代用字對照表中羅列二者以為對照復議孟本李申本潘本鄧遼本為正周本李富華本楊本中島本黃本失校不妥說此壇經無三注釋講堂講經說法的堂舍高座講經說法說戒時為講經說法說戒人設置的比通常席位較高的牀座一切經音義卷三六師子座者轉法輪人所坐之座俗名高座佛教典籍中在敘述講經說法說戒時往往將講堂高座相提並論如六度集經卷八覩梵志五百人會講堂施高座菩薩瓔珞經卷一一一一摩尼珠現百千億七寶講堂一一講堂現百千億七寶高座一一高座現百千億如來至真等正覺劉宋釋慧林龍光寺竺道生法師誄亦有隱講堂之空覿惻高座之虛聞之說摩訶般若波羅蜜法意謂大智度法這裏是將慧能的教誨說成是以無上般若智慧以覺悟成佛的法門參見標題章對摩訶般若波羅蜜經的注釋僧尼道俗即僧俗丁福保佛學大辭典道俗條出家之人曰道在家之人曰俗佛光大辭典道俗條出家衆道與在家衆俗之並稱又稱僧俗緇素緇白僧尼屬出家衆故僧尼與道俗相提並論有語義重復之嫌檢索電子佛典集成可知僧尼道俗一詞最早出現於壇經後來又在禪宗語録和慧超往五天竺國傳等數種佛教史籍和清代淨土宗文獻中出現則該詞很可能是受壇經影響而逐漸成為指代僧俗的一個專有名詞刺史古代官名自漢設立本為朝廷所派督察地方郡縣之官後沿為地方官職名稱隋煬帝唐玄宗兩度改州為郡改稱刺史為太守後又改郡為州稱刺史此後太守與刺史互名清顧炎武日知録隋以後刺史漢之刺史猶今之巡按御史魏晉以下之刺史猶今之總督隋以後之刺史猶今之知府及直隸知州也因此在宋宗鑒集釋門正統中韶州刺史韋據又被稱為韶守即韶州太守韋據人名依據各種佛教典籍他曾任韶州刺史廣州都督一作刺史和殿中侍御史除請惠能說法外他還在惠能死後為惠能立碑籍貫和生卒年不詳官寮官官員寮屬寮這裏泛指參與法會的官員及其屬寮儒士儒儒生士士大夫這裏泛指參與法會而沒有官職的其他知識分子門人門下弟子學道者學習佛教的人印度佛教有一套與中國傳統文化不同的名詞概念佛教初傳中國時為便於國人理解印度來的佛教往往用中國固有的名詞概念來翻譯和比附佛教名詞概念這就是所謂的格義這裏的道指佛道成佛之道成佛的道理或方法是用道家名詞概念來比附佛教名詞概念的産物宗旨宗門要旨這裏指禪門要旨遞相即代相迭相此處意為一人接一人一代接一代鄧遼本釋為互相不確依約依依止依據依憑約約束規範這裏指遵循的標準稟承傳承稟賦豫傳授承承受承接四分段標點復議一分段諸録校本分段不同孟本李申本潘本中島本黃本作一個自然段周本李富華本楊本作兩個自然段鄧遼本作三個自然段復議這部分文字相當於傳統佛經的序分據傳為東晉道安所立的三分科經將佛經分為序分正宗分和流通分序分為諸經之開端常以如是我聞一時佛在等語說明聞信時主處衆等六事即明確指出時間地點及與會人物使衆生知所聞之法確實無誤以證明經中所說為真確可信者故又稱通序證信序和六事證信本節敘述壇經的由來和因緣不僅說明壇經為請說經還明確記述了說法者說法地點所說內容聽聞者記述者等內容與傳統佛經的序分正相符合表明其自立為經的身份其內容聯繫緊密且無對話等其他因素為避免行文瑣碎應按照佛經序分傳統作為一段二分句及標點諸本分句情況大體相同為三句唯孟本為四句校釋疏義分為四句有關問題簡述如下周本在摩訶般若波羅蜜法上加書名號不妥僧尼道俗黃本斷為僧尼道俗如前所述該詞出自壇經且此後一直作為一個專有名詞來用故不應斷開諸官寮三十餘人儒士餘人孟本李申本潘本鄧遼本中島本黃本均作諸官寮三十餘人儒士餘人此處用頓號更為合適周本在摩訶般若波羅蜜法上加書名號不妥孟本將分為兩句語意不盡連貫不妥諸本均合作一句但主語是韋據敘述韋據讓法海集記壇經以流傳後代主語是惠能敘述惠能開始說此壇經故應分為兩句五疏義本章為流通分語義淺顯明瞭沒有需要特別豫以疏釋之處在此僅談談敦煌本壇經及它與其他壇經的關係一敦煌本壇經不是壇經原本周紹良主張敦煌本壇經為壇經原本慧能原本所以將周本命名作敦煌寫本壇經原本並在敦煌寫本壇經之考定中說我相信敦煌本壇經是慧能原始的本子總結這些論據完全可以肯定敦煌本壇經它應該是法海集記的原本是毋庸置疑的應該如何看待周紹良的這一觀點方廣錩曾當面請益周紹良明確回答我這是一家之言大家可以討論也就是說周紹良並不認為這是最終結論只是提出一種可能性供大家探討我們認為敦煌本壇經並非壇經原本理由如下第一校釋疏義標題章已經指出早期流傳的壇經標題使用比較自由沒有定於一尊而敦煌本壇經的標題應是神會滑臺大會以後形成的也就是說起碼就標題而言敦煌本壇經就不是壇經原本第二敦煌本壇經中有這樣一段文字上座法海向前言大師大師去後衣法當付何人大師言法即付了汝不須問吾滅後二十餘年邪法遼亂惑我宗旨有人出來不惜身命定佛教是非竪立宗旨即是吾正法衣不合傳汝不信吾與誦先代五祖傳衣付法誦若據第一祖達磨頌意即不合傳衣很顯然這段文字是滑臺大會之後由神會系僧人增補的也就是說就內容而言敦煌本壇經也有壇經原本中不應有的內容第三神會生於年卒於年惠能的另外一個弟子南陽國師慧忠生年不詳卒於年比神會晚年景德傳燈録卷二八載慧忠生前曾發出這樣的感慨吾比遊方多見此色近尤盛矣聚却三五百衆目視雲漢云是南方宗旨把他壇經改換添糅鄙談削除聖意惑亂後徒豈成言教苦哉吾宗喪矣可見惠能死後不久他的直傳弟子還在活動的時候已經有人篡改壇經這可以視為敦煌本非壇經原本的背景第四全唐文卷七一五載韋處厚撰興福寺內道場供奉大德大義禪師碑銘該碑銘對九世紀初期中國禪宗的發展態勢有一個簡略的敘述其中提到神會系謂洛者曰會得總持之印獨曜瑩珠習徒迷真橘枳變體竟成壇經傳宗這段話對神會評價甚高但對神會系門徒批評很嚴厲文中借用橘生淮南則為枳的典故指斥神會系弟子已經丟掉了神會禪學的真精神其表現形式就是竟成壇經傳宗什麼叫竟成壇經傳宗胡適解釋為這說明壇經是神會門下習徒所作這顯然有點牽強附會這句話的真實含義其實就是敦煌本壇經第一章所說的將壇經流行後代與學道者承此宗旨遞相傳授有所依約以為稟承也就是說凡是神會系的弟子均以壇經作為傳法得法的憑證這種解釋可以在敦煌本壇經中找到內證敦煌本壇經有文稱大師言十弟子已後傳法遞相教授一卷壇經不失本宗不稟受壇經非我宗旨如今得了遞代流行得遇壇經者如見吾親授十僧得教授已寫為壇經遞代流行得者必當見性據說直到六祖為止禪宗一直把一件袈裟當作佛法的表徵代代相傳故有衣法之說而從惠能開始只傳法不傳衣於是壇經被所有禪宗南宗弟子奉為聖典但神會系弟子以壇經傳宗的做法受到其他禪宗派別的批評如前所述敦煌本壇經中偏偏又有以壇經傳宗的論述如果壇經原本中也有以壇經傳宗的內容所有的南宗弟子都以壇經傳宗韋處厚又如何能夠因此而專門批評神會系的弟子呢這也說明敦煌本壇經與敦煌原本不能等同因此敦煌本壇經不可能是壇經原本而應該是經過神會系弟子修訂的神會系傳本二敦煌本壇經是現存年代最古老的壇經敦煌本壇經雖然不是壇經原本但周紹良的另一個觀點敦煌發現的古寫本禪宗六祖慧能壇經是世界上最古老的一本壇經至今依然可信我們考察過現存的斯本敦博本北本北殘片原件也考察過現已不知下落的旅博本現存照片可以肯定所有的敦煌本壇經都源自同一祖本而這一祖本最遲也應在晚唐亦即敦煌的歸義軍統治時期傳入敦煌而現在所傳的其他壇經無論是惠昕本契嵩本德異本宗寶本還是其他什麼本子年代沒有超越敦煌本的周紹良在敦煌寫本壇經之考定一文中從方言俗語歷史背景等諸方面對敦煌本壇經是唐代作品作了詳盡的考察他的考察是具有說服力的很多地方對我們今天重新整理敦煌本壇經都具有很大的啓發意義由此應該指出雖然敦煌本壇經不是壇經原本但由於它是現知年代最早的壇經唐代寫本與其他諸本相比它的形態與所謂原本最為接近與原本有著最為親密的繼承關係站在上述立場上我們認為周紹良的如下兩個觀點應該引起我們的特別重視第一在壇經演變史上曾經出現過一種所謂古繁本的說法這種說法是靠不住的我們不應該再讓這種說法來干擾我們對壇經的研究第二現存的各種壇經諸本都無法與敦煌本比擬也都沒有資格用這些本子來質疑這本古寫本壇經從周紹良的這一觀點我們的邏輯推論是凡用後代的諸本來質疑修訂敦煌本壇經的做法都是站不住腳的三敦煌本與惠昕本契嵩本楊本在其附編二壇經敦博本的學術價值和關於壇經諸本演變禪法思想的探討一文中專設壇經諸本的演變一節討論了壇經的祖本敦煌原本惠昕本契嵩本德異本和曹溪原本宗寶本諸本之間的演變情況及異同並專門用圖表來表示其演化過程壇經諸本的演變是個絶大的題目需要進一步認真研究這裏僅談談敦煌本與惠昕本契嵩本的關係楊曾文在上文中認為壇經祖本亦即周紹良所說壇經原本約産生於到年現已不存從壇經祖本演化出兩種傳本敦煌祖本與惠昕原本敦煌祖本是現存諸種敦煌本壇經的底本而從惠昕原本則演化為現在的惠昕本約形成於年與契嵩本約形成於年也就是說楊曾文主張惠昕本是與敦煌本並立的兩個不同的系統而契嵩本由惠昕本演化而來我們認為這個觀點應該再作探討如前所述敦煌本壇經是神會系傳本這已經成為學術界大部分研究者的共識為什麼說它是神會系傳本因為該本具備一些神會系傳本特有的可稱為招牌的內容什麼是神會系壇經的招牌內容呢最典型的有兩條其一預言神會滑臺大會的吾滅後二十餘年邪法遼亂惑我宗旨有人出來不惜身命定佛教是非竪立宗旨即是吾正法其二韋處厚所謂竟成壇經傳宗上述第一條敦煌本的原文作上座法海向前言大師大師去後衣法當付何人大師言法即付了汝不須問吾滅後二十餘年邪法遼亂惑我宗旨有人出來不惜身命定佛教是非竪立宗旨即是吾正法衣不合傳汝不信吾與誦先代五祖傳衣付法誦若據第一祖達磨頌意即不合傳衣禪宗既然標榜以心傳心則付法正統為頭等大事惠能所以成為正統是因為得到五祖的法衣這一標志證明他為正統六祖以後法衣不傳諸弟子中誰為正統上面這段話用法海問話惠能回答的方式宣布只有神會才是真正的正統我們知道壇經中明確記載法海在惠能十大弟子中居首就連壇經也是他集記的這一點從來沒有任何人懷疑但上述紀事卻宣布雖然法海地位崇高實際並沒有得到惠能的付法惠能的法已經付給了神會這種內容當然只有神會系傳本才會出現上述第二條是韋處厚的記載如果我們沒有資料懷疑韋處厚上述記載的正確性也就必須承認凡是具有以壇經傳宗內容的壇經就是神會系的傳本這樣我們可以根據這兩條招牌內容來判斷某個壇經是否神會系的傳本也就是說如果某一壇經傳本中具備這種神會系招牌的內容就要考慮它是神會系傳本的可能反之如果某一傳本中沒有那些內容則它並非神會系傳本先考察第一條滅後二十餘年有人不惜身命定是非問題惠昕本系的興聖寺本有相應的內容作法海上座問曰和尚去後衣法當付何人師曰吾於大梵寺說法直至今日抄録流行名法寶壇經記汝等守護度諸群生但依此說是真正法師言法海向前吾滅度後二十年間邪法撩亂惑我正宗有一人出來不惜身命定於佛法竪立宗旨即是吾法弘於河洛此教大行若非此人衣不合傳汝多不信吾與汝說先祖達磨大師傳衣偈頌據此偈頌之意衣不合傳惠昕本系的金山天寧寺本也有相應的內容作法海上座問曰和尚去後衣法當付何人師言吾於大梵寺說法直至今日抄録流行名法寶壇經汝等守護度諸群生但依此說是真正法師言法海向前吾滅度後二十年間邪法繚亂惑我正宗有一南陽縣人出來不惜身命定於佛法竪立宗旨即是吾法弘於河洛此教大行師曰汝今須知衣不合傳汝若不信吾與汝說先聖達磨大師傳衣偈據此偈意衣不合傳惠昕本系的大乘寺本同樣也有相應的內容作法海上座問曰和尚去後衣法當付何人師言吾於大梵寺說法直至今日抄録流行名法寶壇經汝等守護度諸群生但依此說是真正法師言法海向前吾滅度後二十年間邪法繚亂惑我正宗有一南陽縣人出來不惜身命定於佛法竪立宗旨即是吾法弘於河洛此教大行師曰汝今須知衣不合傳汝若不信吾與汝說先聖達磨大師傳衣偈據此偈意衣不合傳相反屬於契嵩本系壇經的明版南藏本無相關內容再考察第二條以壇經傳宗問題關於這個問題敦煌本壇經是這樣講的大師言十弟子已後傳法遞相教授一卷壇經不失本宗不稟受壇經非我宗旨如今得了遞代流行得遇壇經者如見吾親授十僧得教授已寫為壇經遞代流行得者必當見性惠昕本系興聖寺本作師教十僧於後傳法以壇經迭相教授即不失宗旨汝今已得法了遞代流行後人得遇壇經如親承吾教若看壇經必當見性惠昕本系金山天寧寺本作師教十僧已報言於後傳法迭相教授壇經即不失宗旨汝今得了遞代流行後人得遇壇經如親見吾教示十僧汝等抄取代代流行若看壇經必當見性惠昕本系大乘寺本作師教十僧已報言於後傳法遞相教授壇經即不失宗旨汝今已得了遞代流行後人得遇壇經者如親見吾教示十僧汝等抄取代代流行若看壇經必當見性同樣屬於契嵩本系壇經的明版南藏本無相關內容限於篇幅上述的探討比較簡單但是擒賊先擒王抓住兩條招牌性標志來考察敦煌本惠昕本與契嵩本我們可以可以發現敦煌本與惠昕本系包括興聖寺本金山天寧寺本大乘寺本等本均有類似的招牌而所謂契嵩本系壇經則沒有這些內容因此我們的結論與楊曾文相反惠昕本包括興聖寺本金山天寧寺本大乘寺本等本與敦煌本一樣都屬於神會系傳本只是現有惠昕本系傳本的定本年代較遲加入了更多的改竄而契嵩本與神會系無關也就不可能由惠昕本演化而來當然這裏不排除年的契嵩本在定稿時參考了年的惠昕本的某些內容弄清敦煌本壇經的屬性有助於正確認識其價值並將其與惠昕等本作進一步比較研究六原始資料下面將諸種敦煌本壇經的第一章録文如下以為參照敦博本惠能大師於大梵寺講堂中升高座說摩訶般若波羅蜜法受無相戒其時座下僧尼道俗一萬餘人韶州刺史違處及諸官寮三十餘人儒士餘人同請大師說摩訶般若波羅蜜法刺史遂令門人僧法海集記流行後代與學道者承此宗旨遞相傳受有所依約以為稟承說此壇經斯本惠能大師於大梵寺講堂中升高座說摩訶般若波羅蜜法受無相戒其時座下僧尼道俗一萬餘人韶州刺史據及諸官寮三十餘人儒土餘人同請大師說摩訶般若波羅蜜法刺史遂令門人僧法海集記流行後代與學道者承此宗旨遞相傳授有所於約以為稟承說此壇經旅博本惠能大師於大梵寺講堂中升高座說摩訶般若波羅蜜法受無相戒其時座下僧尼道俗一萬餘人韶州刺史韋據及諸官寮三十餘人儒土餘人同請大師說摩訶般若波羅蜜法刺史遂令門人僧法海集記流行後代與學道者承此宗旨遞相傳授有所依約以為稟承說此壇經方廣錩修改審定
