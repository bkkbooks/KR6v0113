州話同在壇經悟法傳衣部分就有多個例子汝今向吾邊復求何物神秀遂向南廊下中間壁上題作呈心偈欲求衣法兩月中間至大庾嶺不知向後有數百人來欲擬捉慧能奪衣法惠順得聞言下心開能使惠順即卻向北化人向意同在在句中作為表示動作地點的介詞向作在間見古人詩文唐崔曙登水門樓見亡友張貞期題望黃河詩因以感興人隨川上逝書向壁中留敦煌變文維摩詰經講經文一休於世上求榮貴休向人間覓利名燕子賦二雀兒語燕子好得合頭癡向吾宅裏坐卻促主人欺陸游風雲晝晦夜遂大雪已矣可奈何凍死向孤村以向作表地點的介詞在北方話中較少見在粵語至今仍是常語如有人向度這裏嗎我向度你今天不要回去了向我這裏睡罷這本書我昨天向三聯書店買的梅挺秀試圖對過去被研究者所忽略的壇經的粵方言特徵與俗抄所造成的訛誤問題提出一些看法這無疑是有意義的探討在粵語中向確實是一個作表地點的介詞廣州音字典說向香對著朝著前看這間房子東方向目標我轉認錯了方向了方錯了意志所趨志意偏袒袒護偏從前日者從開始到現在本處無此人向來一響從來從很早到現在他不喝酒響引路的人導這證明梅挺秀的這個看法是有一定根據的不過就與本段壇經文字有關的討論來說盡管梅挺秀的出發點比較新但他的觀點卻很難讓人信服首先根據他上面的論述可以看出古人詩文中有不少以向作在作表地點的介詞的例子而這些例子中很少有明確出自粵人之手的也就是說向作在在古代是比較普遍的並非只在粵人中出現因此他的在是個方言字邏輯上說不通其次他所說的以向作表地點的介詞在北方話中較少見在粵語至今仍是常語並不就能證明向在這裏是個粵語的方言字因為現在的北方話在古代並不是官話因此現在以向作表地點的介詞在北方話中較少見並不證明古代官話中也這樣事實上在雲南等地保存古代官話較多的方言中也有很多以向作在作表地點的介詞的例子如雲南向火向哪個買的等都是如此但雲南話並不屬於粵語系統因此與其說向作在作表地點的介詞是粵語方言不如說是古代的官話的遺存這也許正是梅挺秀談到的有不少以向作在作表地點的介詞的例子出現在古人詩文中的原因第三卻向門前的向字並不一定就是壇經原本所有的換句話說向字不一定出自惠能之口在惠昕等本壇經中卻向門前寫作卻出門外將惠昕本與敦煌本比較不能確定在與向到底說哪個字才是壇經原本所用的字所以梅挺秀這裏只單單解釋向字卻置出字於不顧顯然是不全面的總之單就向字是否粵語的方言字來說梅挺秀並沒有提出讓人信服的證據壇經中是否有粵語方言尚需作進一步的考察和研究二惠能與金剛經本章有如下一些文字客將柴去惠能得錢却向門前忽見一客讀金剛經惠能一聞心明便悟乃問客曰從何處來持此經典客答曰我於蘄州黃梅縣東馮墓山禮拜五祖弘忍和尚見今在彼門人有千餘衆我於彼聽見大師勸道俗但持金剛經一卷即得見性直了成佛惠能聞說宿業有緣便即辭親往黃梅馮墓山禮拜五祖弘忍和尚上述文字有兩個問題值得注意第一惠能因為聞客讀金剛經而心明便悟卻要問客從何處來持此經典既然他已經悟了得魚可以忘筌為什麼還非要追問經典的出處為什麼還非要到黃梅去禮拜弘忍和尚第二惠能因為聞客讀金剛經而心明便悟他到底悟了些什麼金剛經對惠能對禪宗到底具有什麼意義在以後的研讀中需要繼續關注這兩個問題三五祖弘忍一詞的出現按照傳統的說法禪宗以達摩為初祖然後祖燈不墜代代相續弘忍被奉為五祖所以稱五祖弘忍但從現有資料看弘忍在世時並無五祖這一稱號弘忍之後的神秀法如和惠能都被宗奉為六祖但神秀法如和慧能當時也都沒有自稱六祖在中國佛教史上神會曾被正式敕封為七祖因此可以推斷所謂五祖六祖都是神秀惠能等人圓寂之後神會時代才出現的可能是先有私修的譜系然後得到皇家的追認敕封因此壇經中出現的包括五祖弘忍在內的所謂禪宗祖派的傳承譜系甚至現存壇經諸本的定型可能都在神會被封為七祖之後這個問題也需要進一步關注與研究六原始資料敦博本能大師言善知識淨心念摩訶般若波羅蜜法大師不語自淨心神良久乃言善知識淨聽惠能慈父本官范揚左降遷流南新州百姓惠能幻少父亦早亡老母孤遺移來南海艱辛貧乏於市賣柴忽有一客賣柴遂領惠能至於官店容將柴去惠能得錢却向門前忽見一客讀金剛經惠能一聞心明便悟乃問客曰從何處來持此經典客答曰我於新州黃梅縣東馮墓山禮拜五祖弘忍和尚見今在彼門人有千餘衆我於彼聽見大師勸道俗但持金剛經一卷即得見性直了成佛惠能聞說宿葉有緣便即辭親往黃梅馮墓山禮拜五祖弘忍和尚斯本能大師言善知識淨心念摩訶般若波羅蜜法大師不語自淨心神良久乃言善知識淨聽惠能慈父本官范陽左降遷流南新州百姓惠能幼小父小早亡老母孤遺移來海艱辛貧之於市買柴忽有一客買柴遂領惠能至於官店客將柴去惠能得錢却向門前忽見一客讀金剛經惠能一聞心名便悟乃聞客日從何處來持此經典客答曰我於蘄州黃梅懸東馮墓山禮拜五祖弘忍和尚見令在彼門人有千餘衆我於彼聽見大師勸道俗但特金剛經一卷即得見性直了成佛惠能聞說宿業有緣便即辭親往黃梅馮墓山禮拜五祖弘忍和尚旅博本緑衍紅漏粉異與斯本比能大大師言善知識淨心念摩訶般若波羅蜜法大師不語自淨心神良久乃言善知識淨聽惠能慈父本官范陽左降遷流南新州百姓惠能幼小父少早亡老母孤遺移來南海艱辛貧乏於市賣柴忽有一客買柴遂領惠能至於官店客將柴去惠能得錢却向門前忽見一客讀金剛經惠能一聞心明便悟乃聞客日從何處來持此經曲客答曰我於蘄州黃梅懸東馮墓山禮拜五祖弘忍和尚見今在彼門人有千餘衆我於彼聽見大師勸道俗但持金剛經一卷即得見性直了成佛惠能聞說宿業有緣便即辭親往黃梅馮墓山禮拜五祖弘忍和尚方廣錩修改審定
