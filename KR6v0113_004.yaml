body:
  text: 第二章執筆者侯沖研讀班集體討論經文一正文能大師言善知識淨心念摩訶般若波羅蜜法大師不語自淨心神良久乃言善知識靜聽惠能慈父本官范陽左降遷流南新州百姓惠能幼小父亦早亡老母孤遺移來南海艱辛貧乏於市賣柴忽有一客買柴遂領惠能至於官店客將柴去惠能得錢却向門前忽見一客讀金剛經惠能一聞心明便悟乃問客曰從何處來持此經典客答曰我於蘄州黃梅縣東馮墓山禮拜五祖弘忍和尚見今在彼門人有千餘衆我於彼聽見大師勸道俗但持金剛經一卷即得見性直了成佛惠能聞說宿業有緣便即辭親往黃梅馮墓山禮拜五祖弘忍和尚二校記並諸家録校復議能大師言善知識淨心念摩訶般若波羅蜜法旅博本至此止淨敦博本斯本同孟本李申本李富華本楊本潘本鄧遼本黃本徑録周本中島本理校作靜復議惠能認為修持者在日常生活中一方面應該明悟真如佛性的湛然明照一方面應該允許日常的各種思想自然興滅其間的關鍵是修行者不能執著這些思想時時明悟佛性的湛然所以講法開始惠能要求與會者淨心念法若為靜心則似乎與會者的心原來是躁動不安的與惠能禪法思想不符孟本李申本李富華本楊本潘本鄧遼本黃本為正周本中島本理校作靜不妥摩訶般若波羅蜜法敦博本斯本同孟本李申本李富華本楊本潘本鄧遼本中島本黃本徑録周本理校作摩訶般若波羅蜜法經復議孟本李申本李富華本楊本潘本鄧遼本中島本黃本為正周本上文將摩訶般若波羅蜜法誤加書名號這裏又理校改為經繼續加書名號作摩訶般若波羅蜜法經尤為不妥大師不語自淨心神良久乃言善知識靜聽自淨心神敦博本斯本同斯本抄作自心淨神但心淨二字間右邊有倒乙說明當作自淨心神孟本李富華本楊本潘本鄧遼本黃本徑録周本中島本理校作自靜心神李申本注稱斯本作自心淨神未改原文復議參見校記孟本李富華本楊本潘本鄧遼本黃本為正周本中島本將自淨心神理校作自靜心神不妥李申本未辨識倒乙符不妥靜敦博本斯本同作淨理校作靜孟本據閻波爾斯基校訂本改作靜周本楊本潘本鄧遼本中島本黃本理校作靜李申本李富華本徑改作靜復議此處應為請聽衆安靜聽講之意孟本周本楊本潘本鄧遼本中島本黃本為正李申本李富華本徑改不妥惠能慈父本官范陽左降遷流南新州百姓官敦博本斯本同孟本李申本潘本黃本徑録周本中島本理校作貫楊本據鈴木本校作貫認為惠能的父親曾為官但未必在范陽作官鄧遼本據惠昕等三本改作貫校記中另說明盧姓為魏晉隋唐范陽望族李富華本徑改作貫復議據下文左降遷流此處以官意為長本貫云云應據盧氏郡望而來孟本李申本潘本黃本為正周本中島本理校作貫不妥楊本據鈴木本鄧遼本據惠昕本等非敦煌材料改敦煌本不妥李富華本徑改尤為不妥陽敦博本作揚據斯本校作陽孟本徑録作陽周本中島本識作楊理校作陽李申本李富華本徑改作陽楊本識作楊據鈴木本校作陽潘本録作陽注稱敦博本作揚鄧遼本識作揚據斯本校作陽黃本識作揚理校作陽復議潘本鄧遼本為正孟本失校不妥周本中島本黃本不據斯本而理校不妥楊本不據斯本而據鈴木本校不妥李申本李富華本徑改不妥南敦博本斯本同敦博本原作嶺南但嶺字旁有刪除號然有嶺於義為勝孟本録作南說明向達手鈔本南字前有一嶺字字旁有刪除號周本李申本録作南注明敦博本此處有一嶺字旁有刪除符號李富華本楊本中島本徑改作嶺南潘本據興聖寺本校作嶺南注明敦博本南字前有嶺字又刪去的情況鄧遼本說明了敦博本南字前嶺字寫出又刪去的情況據惠昕等三本校補作嶺南黃本録作嶺南校記中說明了敦博本有刪除符號認為依惠昕本不應刪復議如下注釋所述惠能時代嶺南設有新州而無南新州敦博本南前有嶺作嶺南新州於義較勝但敦博本嶺字被刪與斯本僅作南相符故就敦煌本文本整理而言此處不應有嶺但從史實而言此處應有嶺字大約敦煌流傳的壇經一般均無嶺字敦博本因此刪除嶺字以對就錯孟本周本李申本為正潘本鄧遼本黃本據興聖寺本惠昕等本非敦煌材料改敦煌本不妥李富華本楊本中島本徑改尤為不妥新敦博本斯本同孟本周本李申本中島本徑録作新李富華本徑改作作新潘本據興聖寺本校作作新楊本據惠昕本校補作作新鄧遼本據惠昕等三本校補作作新黃本從潘本楊本據惠昕本校補作作新復議兩種敦煌本均作新原句文從字順校加作字應屬畫蛇添足孟本周本李申本中島本為正黃本僅謂敦博本作新失校不妥潘本楊本鄧遼本黃本據興聖寺本惠昕本等非敦煌材料改敦煌本不妥李富華本徑改尤為不妥惠能幼小父亦早亡老母孤遺移來南海幼敦博本作幻據斯本校作幼孟本周本李申本李富華本楊本潘本中島本徑録作幼鄧遼本黃本據斯本校作幼復議鄧遼本黃本為正孟本周本李申本李富華本楊本潘本中島本失校不妥小敦博本作少據斯本校作小孟本據敦博本校作少潘本徑録作小周本理校作小李申本黃本據斯本校作小李富華本楊本中島本徑録作少鄧遼本認為小少二字古通用據斯本校作小復議此處少小均可通但應出校孟本李申本鄧遼本黃本為正周本不據斯本內證而是理校作少不妥潘本李富華本楊本中島本失校不妥亦斯本作小據敦博本校作亦孟本潘本據敦博本校作亦周本李申本鄧遼本中島本黃本徑録作亦李富華本徑改作又楊本據惠昕本校作又復議潘本為正孟本將惠能幼小父亦印作幼小惠亦能父當為嚴重排版錯